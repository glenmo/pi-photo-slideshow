<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Slideshow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: none;
  }

  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide img {
    max-width: 100%;
    max-height: 100%;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  #empty {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #555;
    font-family: sans-serif;
    font-size: 18px;
    text-align: center;
    line-height: 2;
  }

  #info {
    position: absolute;
    bottom: 18px;
    right: 22px;
    color: rgba(255,255,255,0.25);
    font-family: sans-serif;
    font-size: 12px;
    letter-spacing: 0.04em;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="empty">
  No photos found.<br>Add images to /var/www/rubberduck.local/photos/
</div>

<div id="slideA" class="slide"><img id="imgA" src="" alt=""></div>
<div id="slideB" class="slide"><img id="imgB" src="" alt=""></div>

<div id="info"></div>

<script>
  const INTERVAL_MS = 10000;
  const FADE_MS     = 1500;
  const ORDER       = 'random';
  const FIT         = 'contain';
  const PHOTOS_JSON = '/photos.json';
  const REFRESH_MS  = 60000;

  document.querySelectorAll('.slide img').forEach(img => {
    img.style.objectFit = FIT;
  });

  let photos   = [];
  let sequence = [];
  let seqIndex = 0;
  let current  = 'A';
  let timer    = null;
  let paused   = false;

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildSequence() {
    if (!photos.length) return;
    sequence = ORDER === 'random' ? shuffle(photos) : photos.slice();
    seqIndex = 0;
  }

  function getSlot(id) {
    return {
      slide: document.getElementById('slide' + id),
      img:   document.getElementById('img' + id)
    };
  }

  function fadeTo(el, targetOpacity, durationMs) {
    return new Promise(resolve => {
      el.style.transition = `opacity ${durationMs}ms ease-in-out`;
      el.style.opacity = targetOpacity;
      setTimeout(resolve, durationMs);
    });
  }

  function updateInfo(src) {
    const name = decodeURIComponent(src.split('/').pop());
    const idx  = sequence.indexOf(src) + 1;
    document.getElementById('info').textContent =
      idx + ' / ' + sequence.length + '  \u2022  ' + name;
  }

  async function advance() {
    if (!sequence.length) return;

    const nextSrc  = sequence[seqIndex];
    const nextId   = current === 'A' ? 'B' : 'A';
    const currSlot = getSlot(current);
    const nextSlot = getSlot(nextId);

    // preload next image
    nextSlot.img.src = nextSrc;

    // fade current out to black
    await fadeTo(currSlot.slide, 0, FADE_MS);

    // prepare next slide (invisible)
    nextSlot.slide.style.transition = 'none';
    nextSlot.slide.style.opacity = '0';

    // brief pause on black
    await new Promise(r => setTimeout(r, 80));

    // fade next in from black
    updateInfo(nextSrc);
    await fadeTo(nextSlot.slide, 1, FADE_MS);

    current = nextId;
    seqIndex++;
    if (seqIndex >= sequence.length) buildSequence();
  }

  function startSlideshow() {
    if (!photos.length) {
      document.getElementById('empty').style.display = 'block';
      return;
    }
    document.getElementById('empty').style.display = 'none';

    buildSequence();

    // show first image with fade in from black
    const first = sequence[seqIndex];
    const slot  = getSlot('A');
    slot.img.src = first;
    slot.slide.style.transition = 'none';
    slot.slide.style.opacity = '0';
    setTimeout(() => {
      slot.slide.style.transition = `opacity ${FADE_MS}ms ease-in-out`;
      slot.slide.style.opacity = '1';
    }, 50);
    updateInfo(first);
    current = 'A';
    seqIndex++;

    if (timer) clearInterval(timer);
    timer = setInterval(() => {
      if (!paused) advance();
    }, INTERVAL_MS);
  }

  function loadPhotos() {
    fetch(PHOTOS_JSON + '?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const newList = Array.isArray(data) ? data : [];
        const changed = JSON.stringify(newList) !== JSON.stringify(photos);
        photos = newList;
        if (changed || !timer) startSlideshow();
      })
      .catch(() => {
        if (!photos.length)
          document.getElementById('empty').style.display = 'block';
      });
  }

  loadPhotos();
  setInterval(loadPhotos, REFRESH_MS);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      clearInterval(timer);
      advance().then(() => {
        timer = setInterval(() => { if (!paused) advance(); }, INTERVAL_MS);
      });
    }
    if (e.key === 'ArrowLeft') {
      clearInterval(timer);
      seqIndex = Math.max(0, seqIndex - 2);
      advance().then(() => {
        timer = setInterval(() => { if (!paused) advance(); }, INTERVAL_MS);
      });
    }
    if (e.key === 'Escape' || e.key === 'q') {
      paused = !paused;
      document.getElementById('info').textContent = paused
        ? 'Paused — press Esc to resume'
        : '';
    }
  });
</script>
</body>
</html>
