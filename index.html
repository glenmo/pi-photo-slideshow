<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Slideshow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: none;
  }

  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide.active {
    opacity: 1;
  }

  .slide img {
    max-width: 100%;
    max-height: 100%;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  #empty {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #555;
    font-family: sans-serif;
    font-size: 18px;
    text-align: center;
    line-height: 2;
  }

  #info {
    position: absolute;
    bottom: 18px;
    right: 22px;
    color: rgba(255,255,255,0.25);
    font-family: sans-serif;
    font-size: 12px;
    letter-spacing: 0.04em;
    pointer-events: none;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<div id="empty">
  No photos found.<br>Add images to /var/www/html/photos/
</div>

<div id="slideA" class="slide"><img id="imgA" src="" alt=""></div>
<div id="slideB" class="slide"><img id="imgB" src="" alt=""></div>

<div id="info"></div>

<script>
  const INTERVAL_MS   = 10000;
  const FADE_MS       = 1500;
  const ORDER         = 'random';
  const FIT           = 'contain';
  const PHOTOS_JSON   = '/photos.json';
  const REFRESH_MS    = 60000;

  document.querySelectorAll('.slide img').forEach(img => {
    img.style.objectFit = FIT;
  });

  let photos     = [];
  let sequence   = [];
  let seqIndex   = 0;
  let current    = 'A';
  let timer      = null;
  let refreshTimer = null;

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildSequence() {
    if (!photos.length) return;
    if (ORDER === 'random') {
      sequence = shuffle(photos);
    } else {
      sequence = photos.slice();
    }
    seqIndex = 0;
  }

  function nextIndex() {
    seqIndex++;
    if (seqIndex >= sequence.length) {
      buildSequence();
    }
    return seqIndex;
  }

  function showPhoto(src, slotId, imgId) {
    const slide = document.getElementById(slotId);
    const img   = document.getElementById(imgId);
    img.src = src;
    slide.classList.add('active');
  }

  function hideSlot(slotId) {
    document.getElementById(slotId).classList.remove('active');
  }

  function updateInfo(src) {
    const name = src.split('/').pop();
    const idx  = sequence.indexOf(src) + 1;
    document.getElementById('info').textContent = idx + ' / ' + sequence.length + '  \u2022  ' + name;
  }

  function advance() {
    if (!sequence.length) return;

    const next = sequence[seqIndex];
    const nextSlot = current === 'A' ? 'B' : 'A';
    const nextImg  = 'img' + nextSlot;

    showPhoto(next, 'slide' + nextSlot, nextImg);
    updateInfo(next);

    setTimeout(() => {
      hideSlot('slide' + current);
      current = nextSlot;
    }, FADE_MS);

    nextIndex();
  }

  function startSlideshow() {
    if (!photos.length) {
      document.getElementById('empty').style.display = 'block';
      return;
    }
    document.getElementById('empty').style.display = 'none';

    buildSequence();

    const first = sequence[seqIndex];
    showPhoto(first, 'slideA', 'imgA');
    updateInfo(first);
    nextIndex();
    current = 'A';

    if (timer) clearInterval(timer);
    timer = setInterval(advance, INTERVAL_MS);
  }

  function loadPhotos() {
    fetch(PHOTOS_JSON + '?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const newList = Array.isArray(data) ? data : [];
        const changed = JSON.stringify(newList) !== JSON.stringify(photos);
        photos = newList;
        if (changed || !timer) {
          startSlideshow();
        }
      })
      .catch(() => {
        if (!photos.length) {
          document.getElementById('empty').style.display = 'block';
        }
      });
  }

  loadPhotos();
  refreshTimer = setInterval(loadPhotos, REFRESH_MS);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      clearInterval(timer);
      advance();
      timer = setInterval(advance, INTERVAL_MS);
    }
    if (e.key === 'ArrowLeft') {
      clearInterval(timer);
      seqIndex = Math.max(0, seqIndex - 2);
      advance();
      timer = setInterval(advance, INTERVAL_MS);
    }
    if (e.key === 'Escape' || e.key === 'q') {
      clearInterval(timer);
      document.getElementById('info').textContent = 'Paused — press any key to resume';
    }
  });
</script>
</body>
</html>
