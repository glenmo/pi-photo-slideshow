<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Slideshow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: none;
  }

  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide img {
    max-width: 100%;
    max-height: 100%;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  #caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 48px 40px 28px;
    background: linear-gradient(transparent, rgba(0,0,0,0.65));
    color: rgba(255,255,255,0.88);
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: normal;
    letter-spacing: 0.02em;
    text-align: center;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
    pointer-events: none;
  }

  #counter {
    position: absolute;
    bottom: 18px;
    right: 22px;
    color: rgba(255,255,255,0.2);
    font-family: sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    pointer-events: none;
  }

  #empty {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #555;
    font-family: sans-serif;
    font-size: 18px;
    text-align: center;
    line-height: 2;
  }

  #paused-msg {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.4);
    font-family: sans-serif;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="empty">No photos found.<br>Add images to /var/www/rubberduck.local/photos/</div>

<div id="slideA" class="slide"><img id="imgA" src="" alt=""></div>
<div id="slideB" class="slide"><img id="imgB" src="" alt=""></div>

<div id="caption"></div>
<div id="counter"></div>
<div id="paused-msg">Paused</div>

<script>
  const INTERVAL_MS = 10000;
  const FADE_MS     = 1500;
  const CAPTION_DELAY = 400;  // ms after image fades in before caption appears
  const ORDER       = 'random';
  const FIT         = 'contain';
  const PHOTOS_JSON = '/photos.json';
  const REFRESH_MS  = 60000;

  document.querySelectorAll('.slide img').forEach(img => {
    img.style.objectFit = FIT;
  });

  let photos   = [];
  let sequence = [];
  let seqIndex = 0;
  let current   = 'A';
  let timer     = null;
  let paused    = false;
  let advancing = false;  // guard against overlapping transitions
  let captionTimer = null;

  // Convert filename to readable caption
  // e.g. "pip_and_milo_school_pickup.jpg" -> "Pip and Milo School Pickup"
  const LOWERCASE_WORDS = new Set([
    'a','an','the','and','but','or','for','nor','on','at',
    'to','by','in','of','up','as','is','it'
  ]);

  function filenameToCaption(src) {
    const filename = decodeURIComponent(src.split('/').pop());
    const noExt    = filename.replace(/\.[^.]+$/, '');
    const words    = noExt.replace(/[-_]+/g, ' ').trim().split(/\s+/);
    return words.map((word, i) => {
      const lower = word.toLowerCase();
      // Always capitalise first and last word; lowercase small words in between
      if (i === 0 || i === words.length - 1 || !LOWERCASE_WORDS.has(lower)) {
        return lower.charAt(0).toUpperCase() + lower.slice(1);
      }
      return lower;
    }).join(' ');
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildSequence() {
    if (!photos.length) return;
    sequence = ORDER === 'random' ? shuffle(photos) : photos.slice();
    seqIndex = 0;
  }

  function getSlot(id) {
    return {
      slide: document.getElementById('slide' + id),
      img:   document.getElementById('img' + id)
    };
  }

  function fadeTo(el, targetOpacity, durationMs) {
    return new Promise(resolve => {
      el.style.transition = `opacity ${durationMs}ms ease-in-out`;
      el.style.opacity = targetOpacity;
      setTimeout(resolve, durationMs);
    });
  }

  function showCaption(src) {
    const caption = document.getElementById('caption');
    caption.style.opacity = '0';
    clearTimeout(captionTimer);
    captionTimer = setTimeout(() => {
      caption.textContent = filenameToCaption(src);
      caption.style.opacity = '1';
    }, CAPTION_DELAY);
  }

  function hideCaption() {
    const caption = document.getElementById('caption');
    clearTimeout(captionTimer);
    caption.style.opacity = '0';
  }

  function updateCounter(src) {
    const idx = sequence.indexOf(src) + 1;
    document.getElementById('counter').textContent = idx + ' / ' + sequence.length;
  }

  async function advance() {
    if (!sequence.length) return;
    if (advancing) return;  // prevent overlapping transitions
    advancing = true;
    try {

    const nextSrc  = sequence[seqIndex];
    const nextId   = current === 'A' ? 'B' : 'A';
    const currSlot = getSlot(current);
    const nextSlot = getSlot(nextId);

    // preload next image
    nextSlot.img.src = nextSrc;

    // hide caption, fade current out to black
    hideCaption();
    await fadeTo(currSlot.slide, 0, FADE_MS);

    // prepare next slide (invisible)
    nextSlot.slide.style.transition = 'none';
    nextSlot.slide.style.opacity = '0';

    // brief pause on black
    await new Promise(r => setTimeout(r, 80));

    // fade next in from black, then show caption
    updateCounter(nextSrc);
    await fadeTo(nextSlot.slide, 1, FADE_MS);
    showCaption(nextSrc);

      current = nextId;
      seqIndex++;
      if (seqIndex >= sequence.length) buildSequence();
    } catch(e) {
      console.error('Slideshow advance error:', e);
    } finally {
      advancing = false;
    }
  }

  function startSlideshow() {
    if (!photos.length) {
      document.getElementById('empty').style.display = 'block';
      return;
    }
    document.getElementById('empty').style.display = 'none';

    buildSequence();

    const first = sequence[seqIndex];
    const slot  = getSlot('A');
    slot.img.src = first;
    slot.slide.style.transition = 'none';
    slot.slide.style.opacity = '0';
    setTimeout(() => {
      slot.slide.style.transition = `opacity ${FADE_MS}ms ease-in-out`;
      slot.slide.style.opacity = '1';
      updateCounter(first);
      showCaption(first);
    }, 50);
    current = 'A';
    seqIndex++;

    if (timer) clearInterval(timer);
    timer = setInterval(() => {
      if (!paused) advance();
    }, INTERVAL_MS);
  }

  function loadPhotos() {
    fetch(PHOTOS_JSON + '?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const newList = Array.isArray(data) ? data : [];
        const changed = JSON.stringify(newList) !== JSON.stringify(photos);
        photos = newList;
        if (changed || !timer) startSlideshow();
      })
      .catch(() => {
        if (!photos.length)
          document.getElementById('empty').style.display = 'block';
      });
  }

  loadPhotos();
  setInterval(loadPhotos, REFRESH_MS);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      clearInterval(timer);
      advance().then(() => {
        timer = setInterval(() => { if (!paused) advance(); }, INTERVAL_MS);
      });
    }
    if (e.key === 'ArrowLeft') {
      clearInterval(timer);
      seqIndex = Math.max(0, seqIndex - 2);
      advance().then(() => {
        timer = setInterval(() => { if (!paused) advance(); }, INTERVAL_MS);
      });
    }
    if (e.key === 'Escape' || e.key === 'q') {
      paused = !paused;
      document.getElementById('paused-msg').style.display = paused ? 'block' : 'none';
      if (paused) hideCaption();
      else showCaption(sequence[(seqIndex - 1 + sequence.length) % sequence.length]);
    }
  });
</script>
</body>
</html>
